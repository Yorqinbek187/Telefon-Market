<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Aros Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cart">
  <header class="top-header compact-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">Ar</span>
        <span class="brand-text">
          <strong>Aros | Market</strong>
          <small data-i18n="cart">Savat</small>
        </span>
      </a>

      <a class="header-phone" href="tel:+998901234567">+998 90 123 45 67</a>

      <div class="header-actions">
        <a class="download-app-btn" href="https://play.google.com/store/apps/details?id=uz.uzum.market" target="_blank" rel="noopener noreferrer" aria-label="Download Uzum Market app">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 3v10m0 0 4-4m-4 4-4-4M5 17h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span>Download App</span>
        </a>
        <a class="icon-btn" href="index.html" aria-label="Back to home" data-i18n="home">Home</a>
        <a class="icon-btn cart-link" href="checkout.html" aria-label="Go to checkout">
          <span data-i18n="order">Order</span>
          <span class="cart-count" id="cartCount">0</span>
        </a>
        <a class="icon-btn auth-link auth-link-button" href="login.html" data-auth-link="true" aria-label="Open login page">
          <span data-auth-label>Login</span>
        </a>
      </div>
    </div>
  </header>

  <main class="page-section">
    <div class="container">
      <div class="section-heading">
        <div>
          <span class="section-kicker" data-i18n="cart">Savat</span>
          <h1>Xaridlaringiz</h1>
        </div>
        <a class="secondary-link" href="checkout.html" data-i18n="proceed_to_order">Buyurtmaga o'tish</a>
      </div>

      <div class="cart-layout">
        <section class="cart-items-panel" id="cartItemsContainer"></section>
        <aside class="summary-card" id="cartSummary"></aside>
      </div>
    </div>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
